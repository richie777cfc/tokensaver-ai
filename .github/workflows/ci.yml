name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TokenSaver
        run: |
          python -m pip install --upgrade pip
          python -m pip install . --no-build-isolation

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run contract tests
        run: |
          python -m unittest tests.test_output_contract -v
          python -m unittest tests.test_public_export_contract -v
          python -m unittest tests.test_fixture_suite_contract -v

      - name: Verify public-only mode
        run: |
          python tokensaver_cli.py benchmark-suite benchmarks/fixtures/manifest.ci.json --output-dir /tmp/ts-public-only --public-only
          test -f /tmp/ts-public-only/SUITE_RESULTS.public.json
          test -f /tmp/ts-public-only/SUITE_RESULTS.md
          test ! -f /tmp/ts-public-only/SUITE_RESULTS.json

      - name: Run release smoke checks
        run: python scripts/release_smoke.py
